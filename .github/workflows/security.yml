name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Install gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.24.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run repository secret scan
        run: npm run security:scan
