name: Live Provider Smoke

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

jobs:
  live-provider-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate secret configuration
        env:
          OPENROUTER_TEST_API_KEY: ${{ secrets.OPENROUTER_TEST_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_TEST_API_KEY" ]; then
            echo "::error::Missing OPENROUTER_TEST_API_KEY secret"
            exit 1
          fi

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run live provider smoke tests
        env:
          LIVE_PROVIDER_SMOKE: "1"
          OPENROUTER_TEST_API_KEY: ${{ secrets.OPENROUTER_TEST_API_KEY }}
          OPENROUTER_CANARY_MODEL: ${{ vars.OPENROUTER_CANARY_MODEL }}
          OPENROUTER_REQUIRED_MODELS: ${{ vars.OPENROUTER_REQUIRED_MODELS }}
        run: xvfb-run -a npm run test:smoke:live

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-provider-report
          path: playwright-report
          if-no-files-found: ignore
